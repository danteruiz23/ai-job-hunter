# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Form: Blueprint name, branch main, path empty or render.yaml at repo root.
#
# Secrets you set manually (Dashboard → service → Environment):
#   API:  OPENAI_API_KEY  (required)
#   UI:   API_URL is set below to match name: ai-job-hunter-api (override if you
#         rename the API service or use preview URLs).
#
# API auth is disabled (REQUIRE_JOB_HUNTER_API_KEY=0). Rate limiting protects
# against abuse: 10 AI calls/min, 15 uploads/min, 60 general/min per client.
# To re-enable auth: set REQUIRE_JOB_HUNTER_API_KEY=1 and add JOB_HUNTER_API_KEY.
#
# Free web services: use public API_URL for the UI (not internal host:port).
#
# Optional API: CORS_ORIGINS = UI URL if you use SHOW_API_DOCS=1 from another origin.
#
# Optional API: SERPAPI_API_KEY on the FastAPI service enables Google Jobs discovery
# in POST /job-search (https://serpapi.com/manage-api-key).

# If deploy fails: Logs → search RuntimeError (missing OPENAI) or OpenAIError (bad key).

services:
  - type: web
    name: ai-job-hunter-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: REQUIRE_JOB_HUNTER_API_KEY
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: RATE_LIMIT_DISABLED
        value: "0"
      - key: RATE_LIMIT_WINDOW_SEC
        value: "60"
      - key: RATE_LIMIT_DEFAULT
        value: "60"
      - key: RATE_LIMIT_UPLOAD
        value: "15"
      - key: RATE_LIMIT_AI
        value: "10"

  - type: web
    name: ai-job-hunter-ui-koku
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.streamlit
    healthCheckPath: /
    envVars:
      - key: API_URL
        value: https://ai-job-hunter-api.onrender.com
      - key: API_CONNECT_TIMEOUT
        value: "60"
