# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Form: Blueprint name, branch main, path empty or render.yaml at repo root.
#
# Secrets you set manually (Dashboard → service → Environment):
#   API:  OPENAI_API_KEY  (required)
#   UI:   API_URL is set below to match name: ai-job-hunter-api (override if you
#         rename the API service or use preview URLs).
#
# JOB_HUNTER_API_KEY is auto-generated on the API and copied to the UI (same value).
#
# Free web services: use public API_URL for the UI (not internal host:port).
#
# Optional API: CORS_ORIGINS = UI URL if you use SHOW_API_DOCS=1 from another origin.
#
# Optional API: SERPAPI_API_KEY on the FastAPI service enables Google Jobs discovery
# in POST /job-search (https://serpapi.com/manage-api-key).

# If deploy fails: Logs → search RuntimeError (missing OPENAI) or OpenAIError (bad key).

services:
  - type: web
    name: ai-job-hunter-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REQUIRE_JOB_HUNTER_API_KEY
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: JOB_HUNTER_API_KEY
        generateValue: true

  - type: web
    name: ai-job-hunter-ui
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.streamlit
    healthCheckPath: /
    envVars:
      - key: API_URL
        value: https://ai-job-hunter-api.onrender.com
      - key: JOB_HUNTER_API_KEY
        fromService:
          name: ai-job-hunter-api
          type: web
          envVarKey: JOB_HUNTER_API_KEY
