# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Form fields in the dashboard (Blueprint name, branch, path): use defaults;
# path is empty or "render.yaml" at repo root.
#
# After apply, set these in each service -> Environment (secret / prompted):
#   API:  OPENAI_API_KEY, JOB_HUNTER_API_KEY
#   UI:   API_URL (https://<api-name>.onrender.com, no trailing slash), JOB_HUNTER_API_KEY
#
# Free web services cannot receive private network traffic (Render docs). Use the
# public API URL for API_URL, not internal host:port.
#
# Optional API: set CORS_ORIGINS to your UI URL (https://…onrender.com) if you use
# browser clients or SHOW_API_DOCS=1 and open /docs from another origin.

services:
  - type: web
    name: ai-job-hunter-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REQUIRE_JOB_HUNTER_API_KEY
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: JOB_HUNTER_API_KEY
        sync: false

  - type: web
    name: ai-job-hunter-ui
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.streamlit
    healthCheckPath: /
    envVars:
      - key: API_URL
        sync: false
      - key: JOB_HUNTER_API_KEY
        sync: false
